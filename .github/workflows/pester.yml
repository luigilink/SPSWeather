# SPSWeather CI Pester workflow to run tests and code analysis on pull requests.

name: SPSWeather CI Pester Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'PSScriptAnalyzerSettings.psd1'

# The "Publish Test Results" step creates a check run, which requires write
# access to checks. The default GITHUB_TOKEN is read-only on repositories
# created with the modern default, so grant the minimum needed here.
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run Pester Tests
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.3.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Import-Module Pester

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = './test-results.xml'
          $config.Output.Verbosity = 'Detailed'

          Invoke-Pester -Configuration $config

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/composite@v2
        if: always()
        continue-on-error: true
        with:
          files: |
            test-results.xml
          check_name: Pester Test Results

  code-quality:
    name: Code Quality Check
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          # Analyze our own code only: the entry script and the SPSWeather.Common
          # module. The embedded third-party credentialmanager dependency is
          # intentionally excluded (its UTF-16 manifest is shipped verbatim).
          $results = @()
          $results += Invoke-ScriptAnalyzer -Path ./src/SPSWeather.ps1 -Settings ./PSScriptAnalyzerSettings.psd1
          $results += Invoke-ScriptAnalyzer -Path ./src/Test-SPSWeatherReadiness.ps1 -Settings ./PSScriptAnalyzerSettings.psd1
          $results += Invoke-ScriptAnalyzer -Path ./src/Modules/SPSWeather.Common -Recurse -Settings ./PSScriptAnalyzerSettings.psd1

          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found issues"
            exit 1
          }
          else {
            Write-Host "No issues found by PSScriptAnalyzer"
          }
